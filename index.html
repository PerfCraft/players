<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenStone · Server Status</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --card-inner: #f5f5f7;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #a1a1a6;
      --border: rgba(0,0,0,0.08);
      --blue: #007aff;
      --green: #34c759;
      --orange: #ff9f0a;
      --red: #ff3b30;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --card: #1c1c1e;
        --card-inner: #2c2c2e;
        --text-primary: #f5f5f7;
        --text-secondary: #98989d;
        --text-tertiary: #636366;
        --border: rgba(255,255,255,0.08);
      }
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header-eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 0.5rem;
    }
    .header-title {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1.05;
    }
    .header-sub {
      font-size: 17px;
      color: var(--text-secondary);
      margin-top: 0.4rem;
      font-weight: 400;
    }

    /* Main card */
    .card {
      background: var(--card);
      border-radius: 20px;
      border: 0.5px solid var(--border);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }

    /* Status pill */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--card-inner);
      border-radius: 99px;
      padding: 6px 14px 6px 10px;
      margin-bottom: 1.75rem;
    }
    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .status-dot.offline { background: var(--red); }
    .status-dot.online { animation: breathe 2.2s ease-in-out infinite; }
    @keyframes breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.85); }
    }
    .status-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Divider */
    .divider {
      height: 0.5px;
      background: var(--border);
      margin: 0 0 1.75rem;
    }

    /* Metrics grid */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .metric {
      background: var(--card-inner);
      border-radius: 14px;
      padding: 16px;
    }
    .metric-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .metric-value {
      font-size: 36px;
      font-weight: 300;
      letter-spacing: -1.5px;
      color: var(--text-primary);
      line-height: 1;
    }

    /* Progress */
    .progress-section {
      margin-bottom: 1.75rem;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .progress-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .progress-pct {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .track {
      height: 5px;
      background: var(--card-inner);
      border-radius: 99px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      border-radius: 99px;
      background: var(--blue);
      width: 0%;
      transition: none;
    }
    .fill.medium { background: var(--orange); }
    .fill.high   { background: var(--red); }

    /* Meta row (ping + uptime) */
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .meta-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }
    .meta-value {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }
    .meta-value.ping-good  { color: var(--green);  }
    .meta-value.ping-ok    { color: var(--orange); }
    .meta-value.ping-bad   { color: var(--red);    }

    /* Footer row */
    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .last-updated {
      font-size: 12px;
      color: var(--text-tertiary);
    }
    .refresh-btn {
      font-size: 13px;
      font-weight: 500;
      color: var(--blue);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      transition: opacity 0.15s;
    }
    .refresh-btn:hover { opacity: 0.65; }
    .refresh-btn:active { opacity: 0.4; }

    /* Footer text */
    .page-footer {
      margin-top: 2rem;
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: center;
    }
    .page-footer a {
      color: var(--blue);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-eyebrow">SA·MP Roleplay</div>
    <div class="header-title">GreenStone</div>
    <div class="header-sub">Status server în timp real</div>
  </div>

  <div class="card">

    <div class="status-pill">
      <div class="status-dot" id="dot"></div>
      <div class="status-label" id="status-label">Se încarcă…</div>
    </div>

    <div class="divider"></div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Online acum</div>
        <div class="metric-value" id="players">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Capacitate</div>
        <div class="metric-value" id="maxplayers">—</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-title">Ocupare server</span>
        <span class="progress-pct" id="pct-label">—</span>
      </div>
      <div class="track">
        <div class="fill" id="fill"></div>
      </div>
    </div>

    <div class="meta-row">
      <div class="meta-item">
        <span class="meta-label">Ping API</span>
        <span class="meta-value" id="ping-api">—</span>
      </div>

    </div>

    <div class="divider" style="margin:1.25rem 0 1.25rem;"></div>

    <div class="last-updated" id="last-updated">—</div>

  </div>

  <div class="page-footer">
    Date preluate de la <a href="https://api.g-stone.ro/samp/" target="_blank">api.g-stone.ro</a> · actualizare automată la 1s
  </div>

  <script>
    const API = 'https://api.g-stone.ro/samp/';

    const PROXIES = [
      u => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}&_=${Date.now()}`,
      u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}&_=${Date.now()}`,
      u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
      u => `https://thingproxy.freeboard.io/fetch/${u}`,
    ];
    let pi = 0;

    function setPing(elId, ms) {
      const el = document.getElementById(elId);
      if (ms === null) { el.textContent = 'timeout'; el.className = 'meta-value ping-bad'; return; }
      el.textContent = ms + ' ms';
      el.className   = 'meta-value' + (ms < 150 ? ' ping-good' : ms < 400 ? ' ping-ok' : ' ping-bad');
    }

    async function pingUrl(url, timeoutMs) {
      const ctrl = new AbortController();
      const tid  = setTimeout(() => ctrl.abort(), timeoutMs);
      const t0   = Date.now();
      try {
        await fetch(url, { mode: 'no-cors', cache: 'no-store', signal: ctrl.signal });
        return Date.now() - t0;
      } catch(e) {
        return null;
      } finally {
        clearTimeout(tid);
      }
    }

    async function measurePings() {
      const [apiMs, srvMs] = await Promise.all([
        pingUrl('https://api.g-stone.ro/samp/', 3000),
        pingUrl('http://' + SERVER_IP + ':7777', 3000),
      ]);
      setPing('ping-api', apiMs);
      setPing('ping-srv', srvMs);
    }

    function render(data, pingMs) {
      const online  = data.status === 1;
      const players = data.players    ?? 0;
      const max     = data.maxplayers ?? 1;
      const pct     = Math.round((players / max) * 100);

      document.getElementById('dot').className             = 'status-dot ' + (online ? 'online' : 'offline');
      document.getElementById('status-label').textContent  = online ? 'Server online' : 'Server offline';
      document.getElementById('players').textContent       = players;
      document.getElementById('maxplayers').textContent    = max;
      document.getElementById('pct-label').textContent     = pct + '%';

      const fill = document.getElementById('fill');
      fill.style.width = pct + '%';
      fill.className   = 'fill' + (pct >= 80 ? ' high' : pct >= 50 ? ' medium' : '');

      const t = new Date();
      document.getElementById('last-updated').textContent =
        'Actualizat la ' + t.toLocaleTimeString('ro-RO', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    }

    async function tryProxy(index) {
      const url = PROXIES[index](API);
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(res.status);
      const text = await res.text();
      const match = text.match(/\{[^}]+\}/);
      if (!match) throw new Error('parse');
      return JSON.parse(match[0]);
    }


    async function fetchStatus() {
      for (let i = 0; i < PROXIES.length; i++) {
        try {
          const data = await tryProxy((pi + i) % PROXIES.length);
          pi = (pi + i) % PROXIES.length;
          render(data);
          break;
        } catch(e) {
          if (i === PROXIES.length - 1) {
            document.getElementById('dot').className            = 'status-dot offline';
            document.getElementById('status-label').textContent = 'Eroare de conexiune';
            document.getElementById('last-updated').textContent = 'Toate proxy-urile au eșuat';
          }
        }
      }
      pingUrl('https://api.g-stone.ro/samp/', 3000).then(ms => setPing('ping-api', ms));
    }

    fetchStatus();
    setInterval(fetchStatus, 1000);
  </script>

</body>
</html>
